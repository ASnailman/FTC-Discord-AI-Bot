name: Run Pytest

# This tells GitHub to run this script every time you push code to the 'main' branch
on:
    workflow_dispatch:
#   push:
#     branches: [ "main" ]
#   pull_request:
#     branches: [ "main" ]

jobs:
  test:
    # This spins up a temporary Linux server in the cloud
    runs-on: ubuntu-latest

    steps:
    # 1. Copies your code onto the temporary server
    - name: Check out repository
      uses: actions/checkout@v3

    # 2. Installs Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10" # Use the version you are developing with

    # 3. Installs pytest (and any other dependencies you have)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Runs your tests, setting the PYTHONPATH so it finds 'src' automatically
    - name: Run tests with pytest
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v